services:
  db:
    image: postgres:17
    restart: unless-stopped
    container_name: db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${API_DB_DATABASE}
      POSTGRES_USER: ${API_DB_USER}
      POSTGRES_PASSWORD: ${API_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backup:
    build:
      context: .
      dockerfile: postgres-backup-s3/Dockerfile
    restart: unless-stopped
    container_name: backup
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_DATABASE: ${API_DB_DATABASE}
      POSTGRES_USER: ${API_DB_USER}
      POSTGRES_PASSWORD: ${API_DB_PASSWORD}
      S3_BUCKET: ${API_AWS_S3_BACKUP_BUCKET}
      PASSPHRASE: ${API_AWS_BACKUP_PASSPHRASE}
    depends_on:
      - db

  api:
    image: ${DOCKER_REPO}:${DOCKER_API_IMAGE_TAG}
    restart: unless-stopped
    container_name: api
    # Used if starting against an empty db - use once only
    #    environment:
    #      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    #      SPRING_SQL_INIT_MODE: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - db

